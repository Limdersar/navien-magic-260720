<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 KA취급점 대상 나비엔 매직 교육 (추가 일정)</title>
    <!-- CSS: Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-overlay { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px); }
        
        /* 캘린더 스타일 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day { 
            aspect-ratio: 1/1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s;
            position: relative;
            border: 1px solid transparent;
        }
        .calendar-day.disabled { cursor: not-allowed; opacity: 0.2; pointer-events: none; }
        .calendar-day.target { background-color: #f1f5f9; border-color: #e2e8f0; }
        .calendar-day.target:hover { background-color: #e0f2fe; border-color: #bae6fd; transform: translateY(-1px); }
        .calendar-day.selected { background-color: #2563eb !important; color: white !important; font-weight: bold; border-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        
        .calendar-day.has-dot::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 4px;
            height: 4px;
            background-color: #3b82f6;
            border-radius: 50%;
        }
        .calendar-day.selected::after { background-color: white; }

        .session-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-width: 2px; }
        .session-btn.selected { 
            border-color: #2563eb; 
            background-color: #eff6ff; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }
        .session-btn:not(:disabled):hover {
            transform: translateY(-1px);
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- 커스텀 알림/확인 메시지 창 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl transform scale-95 transition-all duration-200">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">알림</h3>
            <p id="modal-message" class="text-slate-600 text-sm mb-6 leading-relaxed whitespace-pre-wrap">알림 내용이 노출되는 자리입니다.</p>
            <div class="flex justify-end gap-3" id="modal-actions">
                <button id="modal-btn-cancel" class="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-semibold text-sm transition-colors hidden">취소</button>
                <button id="modal-btn-confirm" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold text-sm transition-colors">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, runTransaction, query, getDocs, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- 1. 환경 설정 및 Firebase 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCJMy1KAw0GO9GDF-g4LA-zbKzxmPeQ4lo",
            authDomain: "navien-magic-2607.firebaseapp.com",
            projectId: "navien-magic-2607",
            storageBucket: "navien-magic-2607.firebasestorage.app",
            messagingSenderId: "746813386993",
            appId: "1:746813386993:web:066c52e883101bd7aef950",
            measurementId: "G-34NZRTSJHC"
        };

        const globalAppId = 'navien-magic-2607-add'; // 추가 일정 별도 DB 관리용
        const MAX_CAPACITY = 10; 
        const ADMIN_PASSWORD = "admin1234";
        
        // --- 7월 20일 하루만 가능하도록 수정 ---
        const TARGET_DATES = [
            "2026-07-20"
        ];
        // 달력 렌더링 범위: 7/19(일) ~ 7/25(토) 1주일
        const RANGE_START = new Date("2026-07-19"); 
        const RANGE_END = new Date("2026-07-25");   
        
        const TERMS = "개인정보 수집 및 이용에 동의합니다. (수집항목: 대리점명, 이름, 연락처 / 보유기간: 교육 종료 후 1년)";

        // --- 2. 상태 관리 ---
        let state = {
            view: 'registration', 
            user: null,
            registrations: [],
            selectedDate: "2026-07-20", // 기본 선택 날짜 변경
            selectedTime: "정규", 
            isAdminAuthenticated: false,
            isSubmitting: false,
            settings: { startAt: "", endAt: "" },
            
            editRegistrationId: null,
            editData: null,
            searchName: "",
            searchPhone: "",
            
            firebaseStatus: 'connecting',
            firebaseErrorType: null
        };

        let db, auth;

        // --- 2.1 커스텀 알림 모달 ---
        window.showAlert = (message, title = "알림") => {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-modal');
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-message').textContent = message;
                document.getElementById('modal-btn-cancel').classList.add('hidden');
                
                document.getElementById('modal-btn-confirm').onclick = () => {
                    modal.classList.add('hidden');
                    resolve(true);
                };
                modal.classList.remove('hidden');
            });
        };

        window.showConfirm = (message, title = "확인") => {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-modal');
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-message').textContent = message;
                
                const cancelBtn = document.getElementById('modal-btn-cancel');
                const confirmBtn = document.getElementById('modal-btn-confirm');
                cancelBtn.classList.remove('hidden');
                
                cancelBtn.onclick = () => {
                    modal.classList.add('hidden');
                    resolve(false);
                };
                confirmBtn.onclick = () => {
                    modal.classList.add('hidden');
                    resolve(true);
                };
                modal.classList.remove('hidden');
            });
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- 휴대폰 입력값 표준화 및 자동 포맷팅 ---
        function cleanPhoneNumber(phone) {
            return phone.replace(/[^0-9]/g, "");
        }

        window.formatPhoneNumberInput = (input) => {
            let num = cleanPhoneNumber(input.value);
            let formatted = "";
            if (num.length <= 3) {
                formatted = num;
            } else if (num.length <= 7) {
                formatted = num.substring(0, 3) + "-" + num.substring(3);
            } else {
                formatted = num.substring(0, 3) + "-" + num.substring(3, 7) + "-" + num.substring(7, 11);
            }
            input.value = formatted;
        };

        function formatReadableDate(dateString) {
            if (!dateString) return "";
            try {
                const parts = dateString.split('-');
                const d = new Date(parts[0], parseInt(parts[1]) - 1, parts[2]);
                const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
                return `${parseInt(parts[1])}/${parseInt(parts[2])}(${weekDays[d.getDay()]})`;
            } catch (e) {
                return dateString;
            }
        }

        // --- 엑셀 다운로드 기능 ---
        window.exportToExcel = () => {
            if (state.registrations.length === 0) {
                showAlert("다운로드할 신청 내역이 없습니다.");
                return;
            }
            
            const data = [["No", "교육일자", "대리점", "신청자", "연락처", "신청시간"]];
            const sortedRegs = [...state.registrations].sort((a,b) => a.createdAt.localeCompare(b.createdAt));
            const displayRegs = [...sortedRegs].reverse();

            displayRegs.forEach((r) => {
                const originalIndex = sortedRegs.findIndex(item => item.id === r.id) + 1;
                const dateObj = new Date(r.createdAt);
                const formattedTime = dateObj.toLocaleString('ko-KR');
                data.push([originalIndex, r.date, r.agency, r.name, r.phone, formattedTime]);
            });
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + data.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "나비엔_매직_추가교육_신청명단.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // --- 3. Firebase 실시간 데이터 바인딩 컨트롤러 ---
        async function initFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) {
                        setState({ firebaseStatus: 'connected', firebaseErrorType: null });
                        listenToData();
                        listenToSettings();
                    }
                });

                await signInAnonymously(auth);

            } catch (err) {
                console.error("Firebase 초기화 에러:", err);
                if (err.code === 'auth/configuration-not-found') {
                    setState({ firebaseStatus: 'error', firebaseErrorType: 'auth' });
                } else {
                    setState({ firebaseStatus: 'error', firebaseErrorType: 'unknown' });
                }
            }
        }

        function listenToData() {
            const q = collection(db, 'artifacts', globalAppId, 'public', 'data', 'registrations');
            onSnapshot(q, (snap) => {
                state.registrations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                if (state.editRegistrationId) {
                    const currentDoc = state.registrations.find(r => r.id === state.editRegistrationId);
                    if (!currentDoc && state.view !== 'registration') {
                        setState({ view: 'registration', editRegistrationId: null, editData: null });
                        showAlert("해당 신청 내역이 삭제되었거나 존재하지 않습니다.");
                    }
                }
                render(); 
            }, (error) => {
                console.error("Firestore 수신 에러:", error);
                if (error.code === 'permission-denied') {
                    setState({ firebaseStatus: 'error', firebaseErrorType: 'firestore' });
                }
            });
        }

        function listenToSettings() {
            const docRef = doc(db, 'artifacts', globalAppId, 'public', 'data', 'config_coll', 'config');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) state.settings = docSnap.data();
                render();
            });
        }

        window.showFirebaseGuide = () => {
            let message = "";
            let title = "Firebase 설정 가이드";
            
            if (state.firebaseErrorType === 'auth') {
                title = "익명 로그인 활성화 필요";
                message = "Firebase 콘솔에서 익명 로그인을 반드시 켜주셔야 합니다.\n\n[해결 순서]\n1. Firebase 콘솔 접속\n2. Authentication 메뉴 선택\n3. 'Sign-in method' 탭 선택\n4. '익명 (Anonymous)' 사용 설정 후 저장\n5. 이 페이지를 새로고침(F5) 해주세요.";
            } else if (state.firebaseErrorType === 'firestore') {
                title = "Firestore 권한 규칙 설정 필요";
                message = "데이터베이스 읽기/쓰기 권한 규칙이 막혀있습니다.\n\n[해결 순서]\n1. Firebase 콘솔 접속\n2. Firestore Database 메뉴 선택\n3. '규칙(Rules)' 탭 선택\n4. 규칙 내용을 아래와 같이 임시 수정 후 게시\n\nallow read, write: if true;\n\n5. 이 페이지를 새로고침(F5) 해주세요.";
            } else {
                title = "Firebase 연동 확인";
                message = "Firebase 환경 설정을 확인하고 있습니다.\n콘솔에서 익명 로그인과 Firestore Database가 정상 활성화되었는지 순서대로 확인해 주세요.";
            }
            showAlert(message, title);
        };

        window.selectDate = (date) => {
            setState({ selectedDate: date });
        };

        // --- 3.2 신청 로직 ---
        async function handleRegister(e) {
            e.preventDefault();
            
            if (state.firebaseStatus === 'error') {
                window.showFirebaseGuide();
                return;
            }
            if (!checkTimeLimits()) return;
            
            const agency = document.getElementById('input-agency').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const phoneRaw = document.getElementById('input-phone').value.trim();
            const agreed = document.getElementById('input-agree').checked;

            const cleanPhone = cleanPhoneNumber(phoneRaw);

            if (!agreed) { await showAlert("개인정보 동의가 필요합니다."); return; }
            if (!state.selectedDate) { await showAlert("교육 일자를 선택해주세요."); return; }
            if (cleanPhone.length < 9) { await showAlert("올바른 연락처 형식으로 입력해주세요."); return; }

            const isDuplicate = state.registrations.some(r => 
                r.name === name && cleanPhoneNumber(r.phone) === cleanPhone
            );
            if (isDuplicate) {
                await showAlert("동일한 성함과 연락처로 이미 신청된 내역이 있습니다.\n상단의 '신청 내역 조회'를 이용해 주세요.");
                return;
            }

            const count = state.registrations.filter(r => 
                r.date === state.selectedDate && r.time === '정규'
            ).length;

            if (count >= MAX_CAPACITY) {
                await showAlert("이미 해당 회차의 정원이 마감되었습니다.");
                return;
            }

            setState({ isSubmitting: true });
            try {
                let formattedPhone = phoneRaw;
                if (cleanPhone.length === 11) {
                    formattedPhone = cleanPhone.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
                } else if (cleanPhone.length === 10) {
                    formattedPhone = cleanPhone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
                }

                const newDocRef = doc(collection(db, 'artifacts', globalAppId, 'public', 'data', 'registrations'));
                await setDoc(newDocRef, {
                    agency,
                    name,
                    phone: formattedPhone, 
                    date: state.selectedDate,
                    time: '정규',
                    createdAt: new Date().toISOString(),
                    userId: state.user.uid
                });
                
                setState({ view: 'success', isSubmitting: false });
            } catch (err) {
                await showAlert("오류 코드: " + err.code + "\n사유: " + err.message, "신청 실패");
                setState({ isSubmitting: false });
            }
        }

        // --- 3.3 일정 변경 로직 ---
        async function handleUpdate(e) {
            e.preventDefault();
            if (!checkTimeLimits()) return;
            
            const docId = state.editRegistrationId;
            if (!docId) return;

            const count = state.registrations.filter(r => 
                r.date === state.selectedDate && 
                r.time === '정규' &&
                r.id !== docId
            ).length;

            if (count >= MAX_CAPACITY) {
                await showAlert("선택하신 회차의 정원이 이미 마감되었습니다.");
                return;
            }

            setState({ isSubmitting: true });
            try {
                await runTransaction(db, async (transaction) => {
                    const docRef = doc(db, 'artifacts', globalAppId, 'public', 'data', 'registrations', docId);
                    const docSnap = await transaction.get(docRef);
                    if (!docSnap.exists()) {
                        throw new Error("신청 데이터가 존재하지 않습니다.");
                    }
                    transaction.update(docRef, {
                        date: state.selectedDate,
                        updatedAt: new Date().toISOString()
                    });
                });

                await showAlert("일정이 성공적으로 변경되었습니다.");
                
                const updatedDoc = state.registrations.find(item => item.id === docId);
                setState({ 
                    view: 'my_status', 
                    editData: updatedDoc || state.editData,
                    isSubmitting: false
                });
            } catch (err) {
                await showAlert("오류 사유: " + err.message, "변경 실패");
                setState({ isSubmitting: false });
            }
        }

        function checkTimeLimits() {
            const now = new Date();
            if (state.settings.startAt && new Date(state.settings.startAt) > now) {
                showAlert("아직 접수 기간이 아닙니다."); return false;
            }
            if (state.settings.endAt && new Date(state.settings.endAt) < now) {
                showAlert("접수 기간이 종료되었습니다."); return false;
            }
            return true;
        }

        // --- 3.4 내역 조회 및 취소 ---
        window.searchMyRegistration = (nameOverride, phoneOverride) => {
            const name = nameOverride || document.getElementById('search-name').value.trim();
            const phoneRaw = phoneOverride || document.getElementById('search-phone').value.trim();

            if (!name || !phoneRaw) {
                showAlert("이름과 연락처를 모두 입력해주세요."); return;
            }

            const cleanSearchPhone = cleanPhoneNumber(phoneRaw);

            const myDoc = state.registrations.find(r => 
                r.name === name && cleanPhoneNumber(r.phone) === cleanSearchPhone
            );
            
            if (myDoc) {
                setState({ 
                    view: 'my_status', 
                    searchName: name, 
                    searchPhone: myDoc.phone, 
                    editRegistrationId: myDoc.id,
                    editData: myDoc
                });
            } else {
                showAlert("일치하는 신청 내역이 없습니다.\n이름과 연락처를 다시 확인해주세요.");
            }
        };

        window.cancelMyRegistration = async () => {
            const confirmed = await showConfirm("정말 신청을 취소하시겠습니까?\n취소 후 복구가 불가능하며 다시 신청하셔야 합니다.", "신청 취소");
            if (!confirmed) return;
            
            setState({ isSubmitting: true });
            try {
                await deleteDoc(doc(db, 'artifacts', globalAppId, 'public', 'data', 'registrations', state.editRegistrationId));
                await showAlert("신청이 정상적으로 취소되었습니다.");
                window.resetToHome();
            } catch (err) {
                await showAlert("취소 실패: " + err.message);
                setState({ isSubmitting: false });
            }
        };

        window.goToEditMode = () => {
            setState({ 
                view: 'registration', 
                selectedDate: state.editData.date 
            });
        };

        window.resetToHome = () => {
            setState({ 
                view: 'registration', 
                editRegistrationId: null, 
                editData: null,
                searchName: "",
                searchPhone: "",
                isSubmitting: false
            });
        };

        // --- 관리자 기능 ---
        window.deleteRegistration = async (id) => {
            const confirmed = await showConfirm("해당 신청 내역을 삭제하시겠습니까?", "삭제 확인");
            if (!confirmed) return;
            try {
                await deleteDoc(doc(db, 'artifacts', globalAppId, 'public', 'data', 'registrations', id));
                showAlert("삭제되었습니다.");
            } catch (err) {
                showAlert("삭제 실패: " + err.message);
            }
        };

        window.updateSettings = async () => {
            const startAt = document.getElementById('settings-start').value;
            const endAt = document.getElementById('settings-end').value;
            try {
                const docRef = doc(db, 'artifacts', globalAppId, 'public', 'data', 'config_coll', 'config');
                await setDoc(docRef, { startAt, endAt });
                showAlert("설정 저장에 성공했습니다.");
            } catch (err) {
                showAlert("설정 저장 실패: " + err.message);
            }
        };

        // --- 4. UI 렌더링 ---
        function renderCalendar() {
            const dates = [];
            let current = new Date(RANGE_START);
            while (current <= RANGE_END) {
                dates.push(new Date(current));
                current.setDate(current.getDate() + 1);
            }

            const formatISO = (d) => {
                const pad = (n) => n < 10 ? '0'+n : n;
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            };

            return `
                <div class="calendar-grid">
                    ${['일','월','화','수','목','금','토'].map(d => `<div class="text-center text-[11px] font-bold text-slate-400 py-1">${d}</div>`).join('')}
                    ${dates.map(d => {
                        const dateStr = formatISO(d);
                        const isTarget = TARGET_DATES.includes(dateStr);
                        const isSelected = state.selectedDate === dateStr;
                        const day = d.getDate();
                        const isSunday = d.getDay() === 0;
                        const isSaturday = d.getDay() === 6;

                        return `
                            <div onclick="${isTarget ? `window.selectDate('${dateStr}')` : ''}" 
                                class="calendar-day text-sm ${isTarget ? 'target has-dot' : 'disabled'} ${isSelected ? 'selected' : ''}">
                                <span class="${!isTarget ? '' : isSunday ? 'text-red-500' : isSaturday ? 'text-blue-500' : 'text-slate-800'} ${isSelected ? '!text-white' : ''}">${day}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

                                                        <td class="px-6 py-4 font-bold text-blue-600">${r.date}</td>
                                                        <td class="px-6 py-4">${r.agency}</td>
                                                        <td class="px-6 py-4 font-semibold text-slate-800">${r.name}</td>
                                                        <td class="px-6 py-4 text-slate-600">${r.phone}</td>
                                                        <td class="px-6 py-4 text-center">
                                                            <button onclick="window.deleteRegistration('${r.id}')" class="text-red-400 hover:text-red-600 p-2 rounded transition-colors" title="삭제">
                                                                <i class="fa-solid fa-trash-can"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                    ${state.registrations.length === 0 ? '<div class="p-12 text-center text-slate-400">신청 내역이 없습니다.</div>' : ''}
                                </div>
                            </div>
                        </main>
                    `;
                }
            }

            if (state.isSubmitting) {
                appDiv.insertAdjacentHTML('beforeend', '<div class="fixed inset-0 loading-overlay flex items-center justify-center z-50"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>');
            }
        }

        window.setView = (view) => setState({ view });
        window.loginAdmin = () => {
            if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) setState({ isAdminAuthenticated: true });
            else showAlert("비밀번호가 틀렸습니다.");
        };

        // Firebase 초기 연동 실행
        initFirebase();

    </script>
</body>
</html>
